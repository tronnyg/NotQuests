---
chat:
  wrong-command-usage: <error>Utilizarea greșită a comenzii!
  missing-permission: "<error>Fără permisiune! Permisiune necesară \nnodul: <highlight>%PERMISSION%"
  too-many-arguments: <error>Prea multe argumente!
  quest-successfully-accepted: |2

    <CENTER><main>[Misiune acceptată]
    <CENTER><highlight><BOLD>%QUESTNAME%
    <EMPTY>
  quest-description: '<main>Descrierea misiunii: <unimportant>%QUESTDESCRIPTION%'
  quest-already-accepted: <error>Misiunea a fost deja acceptată.
  quest-failed: |2

    <CENTER><negative>[Misiune Eșuată]
    <CENTER><highlight><BOLD>%QUESTNAME%<EMPTY>
  quest-aborted: ''
  quest-completed-and-rewards-given: |2

    <CENTER><positive>[Misiune Finalizată]
    <CENTER><highlight><BOLD>%QUESTNAME%<EMPTY>
  quest-completed-rewards-prefix: '    <highlight>Recompense:'
  quest-completed-rewards-rewardformat: '    <highlight>-<unimportant>%reward%'
  quest-completed-rewards-suffix: <EMPTY>
  quest-not-all-requirements-fulfilled: '<negative>Nu îndepliniți toate cerințele acestei misiuni! Cerință necesară:'
  action-not-all-conditions-fulfilled: '<negative>Nu îndepliniți toate condițiile necesare pentru această acțiune! Condiții necesare în continuare:'
  missing-quest-description: <unimportant>Această misiune nu are o descriere a misiunii.
  objectives-label-after-quest-accepting: '<highlight>Obiective:'
  questpoints:
    query: "<main>În prezent aveți\n<highlight>%QUESTPOINTS%</highlight> puncte de misiune."
    none: <error>Se pare că nu ai niciun punct de misiune!
    notify-when-changed:
      set: '<main>Punctele tale de misiune au fost setate la<highlight>%NEWQUESTPOINTSAMOUNT%</highlight>.'
      add: '<highlight>+%QUESTPOINTSTOADD%<success>puncte de misiune!'
      remove: '<highlight>-%QUESTPOINTSTOREMOVE%<negative>puncte de misiune!'
  no-quests-accepted: <error>Se pare că nu ai nicio misiune activă!
  quest-does-not-exist: "<error>Misiunea\n<highlight>%QUESTNAME%</highlight> nu există!"
  quest-not-found-or-does-not-exist: "<error>Misiune\n<highlight>%QUESTNAME%</highlight> negăsită sau inactivă!"
  active-quests-label: '<highlight>Misiuni active:'
  take-disabled: <error>Acceptarea sau previzualizarea misiunii<highlight>%QUESTNAME%</highlight> este dezactivată.
  abort-disabled: "<error>Abandonarea misiunii\n<highlight>%QUESTNAME%</highlight> este dezactivată."
  quest-not-active-error: "<error>Eroare\n<highlight>%QUESTNAME%</highlight> nu este o misiune activă!"
  force-add-active-quest-accepted: '<success>Ai acceptat cu succes misiunea (Forțată).'
  add-active-quest-player-object-not-found: '<warn>Eroare: Obiectul playerului nu a fost găsit. Vă rugăm să raportați acest lucru dezvoltatorului pluginului.'
  reached-max-accepts-limit: "<red>Ai acceptat deja această misiune de prea multe ori. Nu poți decât să o accepți\n<highlight>%MAXACCEPTS%</highlight> ori, dar ai acceptat deja\n<highlight>%ACCEPTEDAMOUNT%</highlight>ori."
  reached-max-fails-limit: "<red>Ai eșuat deja această misiune de prea multe ori. Poți doar să o eșuezi.\n<highlight>%MAXFAILS%</highlight> Ori, dar deja ai eșuat\n<highlight>%FAILEDAMOUNT%</highlight> ori."
  reached-max-completions-limit: "<red>Ai finalizat deja această misiune de prea multe ori. O poți finaliza doar\n<highlight>%MAXCOMPLETIONS%</highlight> ori, dar deja ai terminat-o\n<highlight>%COMPLETEDAMOUNT%</highlight> ori."
  reached-max-active-quests-per-player-limit: "<red>Nu poți accepta mai mult de\n<highlight>%MAXACTIVEQUESTSPERPLAYER%</highlight> Misiuni."
  quest-on-cooldown:
    minute: '<red>Această misiune este în așteptare! Trebuie să mai aștepți încă <highlight> 1 minute</highlight>până când poți să o iei din nou.'
    minutes: '<red>Această misiune este în așteptare! Trebuie să mai aștepți încă <highlight>%MINUTES% minute</highlight> până când poți să o iei din nou.'
    hour: '<red>Această misiune este în așteptare! Trebuie să mai aștepți încă <highlight>1 oră</highlight> până când îl poți lua din nou.'
    hours: '<red>Această misiune este în așteptare! Trebuie să mai aștepți încă <highlight>%HOURS% ore</highlight> până când îl poți lua din nou.'
    day: '<red>Această misiune este în așteptare! Trebuie să mai aștepți încă <highlight>1 zi</highlight> până când îl poți lua din nou.'
    days: '<red>Această misiune este în așteptare! Trebuie să mai aștepți încă <highlight>%DAYS% zile</highlight> până când poți să o iei din nou.'
  profiles:
    list-current: "<highlight>Profil actual:\n<main>%PROFILENAME%(%QUESTPOINTS% puncte de misiune)"
    list-other-heading: '<highlight>Alte profiluri:'
    list-other-none: '  <main>Nu mai aveți profiluri.'
    list-other: '  <highlight>-<main>%PROFILENAME%(%QUESTPOINTS% puncte de misiune)'
    change-same-profile: '<error>Folosești deja profilul respectiv!'
    change-profile-doesnt-exist: '<error>Profilul respectiv nu există.'
    changed-successfully: '<success>Ți-ai schimbat cu succes profilul din %OLDPROFILENAME% către<highlight>%NEWPROFILENAME%</highlight>!'
    create-already-exists: '<error>Un profil cu numele <highlight>%NEWPROFILENAME%</highlight> există deja.'
    create-invalid-characters: '<error>Numele de profil pe care l-ați furnizat conține caractere nevalide.'
    created-successfully: "<success>Ați creat cu succes profilul <highlight>%NEWPROFILENAME%</highlight>!\nPentru a comuta la acesta, utilizați <highlight2>/nq profiluri\nschimbă %NEWPROFILENAME%</highlight2>"
  conversations:
    choose-answer-prefix: |-
      <EMPTY>
      <main>Alege-ți răspunsul:</main>
    choose-answer-answer-hover-text: '<highlight>Faceți clic pentru a răspunde'
    ended-previous-conversation: '<main>Ai încheiat conversația anterioară!'
    speaker-line-format: '%SPEAKERCOLOR%%SPEAKER%<GRAY>%MESSAGE%'
    answer-option-line-format: ' <main>%OPTIONNUMBER%<gray>%MESSAGE%'
  objectives:
    counter: '<highlight>%OBJECTIVEIDWITHSUBID%</highlight><main>%OBJECTIVENAME%:'
    counterForObjectiveObjective: '<highlight>%OBJECTIVEIDWITHSUBID%</highlight><main>%OBJECTIVEHOLDERNAME%:'
    subObjectivePrefixAppend: '    '
    hidden: <highlight>%OBJECTIVEID%</highlight><unimportant><BOLD>[ASCUNS]
    description: "    <veryUnimportant>└─\n<unimportant>Descriere:\n<main>%OBJECTIVEDESCRIPTION%"
    progress: "    <veryUnimportant>└─\n<unimportant>Progres:\n<main>%ACTIVEOBJECTIVEPROGRESS% /\n%OBJECTIVEPROGRESSNEEDED%"
    successfully-completed: |2

      <CENTER><success>[Obiectiv Completat]
      <CENTER><highlight><bold>%OBJECTIVENAME%</bold><RESET><main>(%QUESTNAME%)<EMPTY>
    successfully-completed-rewards-prefix: '    <highlight>Recompense:'
    successfully-completed-rewards-rewardformat: '    <highlight>-<unimportant>%reward%'
    successfully-completed-rewards-suffix: <EMPTY>
    taskDescription:
      global:
        prefix: '    <veryUnimportant>└─<unimportant>'
        suffix: ''
      breakBlocks:
        base: 'Blocuri de pauză: <main>%BLOCKTOBREAK%'
      breed:
        base: 'Entități de rasă: <main>%ENTITYTOBREED%'
      pickupItems:
        base: 'Articole de ridicat: <main>%ITEMTOPICKUPTYPE% %(%%ITEMTOPICKUPNAME%%)%'
      consumeItems:
        base: "Articole de consum:\n<main>%ITEMTOCONSUMETYPE% %(%%ITEMTOCONSUMENAME%%)%"
      craftItems:
        base: 'Articole de artizanat: <main>%ITEMTOCRAFTTYPE% &(%%ITEMTOCRAFTNAME%%)%'
      deliverItems:
        base: 'Livrați articole: <main>%ITEMTODELIVERTYPE%%(%%ITEMTODELIVERNAME%%(%'
        deliver-to-npc: '      <GRAY>Livrați-l la <WHITE>%NPCNAME%'
        deliver-to-npc-not-available: '      <GRAY>NPC-ul de livrare nu este disponibil momentan!'
      enchant:
        base: "Vrăjește obiecte cu %ENCHANTMENT%:<main>%ITEMTOENCHANTTYPE% %\n(%%ITEMTOENCHANTNAME%%(%"
      escortNPC:
        base: 'Escorta <main>%NPCNAME%</main> către<main>%DESTINATIONNPCNAME%'
      fishItems:
        base: 'Articole din pește: <main>%ITEMTOFISHTYPE% %(%%ITEMTOFISHNAME%%)%'
      killMobs:
        base: 'Ucide Creaturi: <main>%MOBTOKILL%'
      otherQuest:
        base: 'Misiunea completă: <main>%OTHERQUESTNAME%'
      placeBlocks:
        base: 'Plasează blocuri: <main>%BLOCKTOPLACE%'
      reachLocation:
        base: 'Locație de acces:<main>%LOCATIONNAME%'
      talkToNPC:
        base: 'Vorbește cu <main>%NAME%'
        npc-not-available: '    <GRAY>NPC-ul țintă nu este disponibil momentan!'
      triggerCommand:
        base: 'Scop: <main>%TRIGGERNAME%'
      killEliteMobs:
        base: 'Elimină Creaturile de Elită: <main>%ELITEMOBNAME%'
        any: 'Elimină orice Creatură de Elită!'
      runCommand:
        base: 'Executare comandă: <main>%COMMANDTORUN%'
      interact:
        base: '%INTERACTTYPE% Locație:<main>%COORDINATES% <main>în lume%WORLDNAME%'
      jump:
        base: 'Salt <main>%AMOUNTOFJUMPS%</main>ori'
      objective:
        base: '%OBJECTIVEHOLDERNAME%'
      sneak:
        base: 'Furișat <main>%AMOUNTOFSNEAKS%</main>ori'
      smelt:
        base: 'Obiecte topite: <main>%ITEMTOSMELTTYPE% %(%%ITEMTOSMELTNAME%%)%'
      openBuriedTreasure:
        base: 'Deschide comori îngropate'
      shearSheep:
        base: 'Tunde <main>%AMOUNTOFSHEEP%</main>Oaie'
      townyReachResidentCount:
        base: 'Suma atinsă pentru rezidenți: <main>%AMOUNT%'
      townyNationReachTownCount:
        base: 'Suma orașului atinsă cu națiunea ta:<main>%AMOUNT%'
      jobsRebornReachJobLevel:
        base: 'Atinge nivelul de job <main>%AMOUNT%</main>cu job-ul <main>%JOB%'
      SlimefunResearch:
        base: 'Cheltuieli pentru cercetare'
      ProjectKorraUseAbility:
        base: 'Abilitatea de utilizare: <main>%ABILITY%'
      BetonQuestCompleteObjective:
        base: "Finalizare obiectiv:\n<main>%BETONQUESTOBJECTIVENAME%"
      ultimateJobsReachJobLevel:
        base: 'Atinge nivelul de job <main>%AMOUNT%</main> cu job-ul <main>%JOBID%'
  conditions:
    boolean:
      not-fulfilled: "<warn>Următoarele trebuie să fie%BOOLEANREQUIREMENT%<highlight>%VARIABLESINGULAR%</highlight>."
      variable-not-found: "<error>Eroare: variabilă\n<highlight>%VARIABLENAME%</highlight> Nu a fost găsit. Raportați acest lucru proprietarului serverului."
      wrong-operator: "<error>Eroare: operator variabil\n<highlight>%OPERATOR%/highlight> este invalid. Raportați acest lucru proprietarului serverului."
objective-tracking:
  actionbar-progress-update:
    default: "<positive>%QUESTNAME%</positive> <unimportant>-<main>%OBJECTIVENAME%</main><unimportant>(<positive>%ACTIVEOBJECTIVEPROGRESS%<unimportant>/ <main>%OBJECTIVEPROGRESSNEEDED%<unimportant>-<highlight>%OBJECTIVEPROGRESSPERCENTAGE%%<unimportant>)"
    only-one-max-progress: "<positive>%QUESTNAME%</positive> <unimportant>-<main>%OBJECTIVENAME%</main><unimportant>(<highlight>%OBJECTIVEPROGRESSPERCENTAGE%%<unimportant>)"
  bossbar-progress-update:
    default: "<positive>%QUESTNAME%</positive> <unimportant>-<main>%OBJECTIVENAME%</main><unimportant>(<positive>%ACTIVEOBJECTIVEPROGRESS%<unimportant>/ <main>%OBJECTIVEPROGRESSNEEDED%<unimportant>-<highlight>%OBJECTIVEPROGRESSPERCENTAGE%%<unimportant>)"
    only-one-max-progress: "<positive>%QUESTNAME%</positive> <unimportant>-<main>%OBJECTIVENAME%</main><unimportant>(<highlight>%OBJECTIVEPROGRESSPERCENTAGE%%<unimportant>)"
titles:
  quest-accepted:
    title: <main>Misiune acceptată
    subtitle: <highlight>%QUESTNAME%
  quest-completed:
    title: <positive>Misiune Finalizată
    subtitle: <highlight>%QUESTNAME%
  quest-failed:
    title: <negative>Misiune Eșuată
    subtitle: <highlight>%QUESTNAME%
placeholders:
  questcooldownleftformatted:
    prefix: ''
    minute: '1 minute'
    minutes: '%MINUTES% Minute'
    hour: '1 Oră'
    hours: '%HOURS% Ore'
    day: '1 zi'
    days: '%DAYS% Zile'
    no-cooldown: ''
gui:
  main:
    title: '                <highlight2>Misiuni'
    backgroundFill:
      material: 'STICLĂ_NEAGRA_VĂLUCITĂ'
    background:
      '1':
        minX: 0
        maxX: 8
        minY: 0
        maxY: 0
      '2':
        minX: 0
        maxX: 0
        minY: 0
        maxY: 5
      '3':
        minX: 1
        maxX: 1
        minY: 0
        maxY: 5
      '4':
        minX: 2
        maxX: 2
        minY: 0
        maxY: 5
    button:
      questpoints:
        name: "<highlight>Puncte de misiune"
        lore:
          - "<main>Puncte de misiune actuale: <highlight2>%QUESTPOINTS%"
        x: 8
        y: 0
      takequest:
        name: "<positive>Ia o Misiune"
        lore:
          - "<unimportant>Începe o nouă Misiune!"
          - ""
          - "<veryUnimportant>Unele Misiuni nu pot fi"
          - "<veryUnimportant>A început așa."
        x: 0
        y: 1
      abortquest:
        name: "<negative>Anulează o misiune"
        lore:
          - ""
          - "<veryUnimportant>Anularea unei Misiuni poate"
          - "<veryUnimportant>Duce la pedepse."
        x: 0
        y: 2
      activequests:
        name: "<highlight>Misiuni Active"
        lore:
          - ""
          - "<veryUnimportant>Arată toate ale tale"
          - "<veryUnimportant>Misiuni active."
        x: 0
        y: 3
  activeQuests:
    title: '             <highlight2>Misiuni Active'
    button:
      activeQuestButton:
        name: "<highlight>%QUESTNAME% <positive>[ACTIV]"
        lore:
          - "<unimportant>Progres:<positive>%COMPLETEDOBJECTIVESCOUNT% <unimportant>/<main>%ALLOBJECTIVESCOUNT%"
          - "<main>Click pentru a vedea detalii!"
  reward-hidden-text: <unimportant>[ASCUNS]
  availableQuests:
    title: '         <highlight2>Misiuni Disponibile'
    button:
      questPreview:
        name-if-not-accepted: "<highlight>%QUESTNAME%"
        name-if-accepted: "<highlight>%QUESTNAME%<reset><positive>[ACCEPTAT]"
        lore:
          - "<veryUnimportant>%WRAPPEDQUESTDESCRIPTION%"
          - "<main>Clic pentru a deschide Misiunea!"
  takeQuestChoose:
    title: <highlight2>Ce misiune vrei să iei?
    size:
      minX: 3
      minY: 1
      maxX: 8
      maxY: 5
    button:
      questPreview:
        name-if-not-accepted: "<highlight>%QUESTNAME%"
        name-if-accepted: "<highlight>%QUESTNAME% <reset><positive>[ACCEPTAT]"
        lore:
          - "<veryUnimportant>%WRAPPEDQUESTDESCRIPTION%"
          - "<main>Clic pentru a previzualiza Misiunea!"
  abortQuestChoose:
    title: '  <highlight2>Misiuni active pe care le poți anula'
    button:
      abortQuestPreview:
        name: "<highlight>%QUESTNAME% <positive>[ACTIV]"
        lore:
          - "<unimportant>Progres:<positive>%COMPLETEDOBJECTIVESCOUNT% <unimportant>/<main>%ALLOBJECTIVESCOUNT%"
          - "<negative>Apasă pentru a anula misiunea!"
  abortQuest:
    title: '         <negative>Anulare confirmare'
    button:
      confirmAbort:
        name: "<highlight>%QUESTNAME% <positive>[ACTIV]"
        lore:
          - "<unimportant>Progres:<positive>%COMPLETEDOBJECTIVESCOUNT% <unimportant>/<main>%ALLOBJECTIVESCOUNT%"
          - "<negative>Faceți clic pentru a abandona misiunea<highlight>%QUESTNAME%</highlight>!"
        x: 3
        y: 1
      cancelAbort:
        name: "<positive>Clic pentru a NU abandona această misiune"
        lore:
          - "<positive>Și anulați această acțiune"
        x: 5
        y: 1
  previewQuest:
    title: <highlight2>Previzualizare misiune
    button:
      description:
        name: "<highlight>Descriere"
        lore:
          - "<veryUnimportant>%WRAPPEDQUESTDESCRIPTION%"
        lore-if-empty:
          - "<veryUnimportant>???"
        x: 2
        y: 0
      rewards:
        name: "<positive>Recompense"
        lore:
          - "<WHITE>%QUESTREWARDS%"
        lore-if-empty:
          - "<veryUnimportant>Niciunul sau ascuns"
        x: 4
        y: 0
      requirements:
        name: "<negative>Cerințe"
        lore:
          - "<WHITE>%QUESTREQUIREMENTS%"
        lore-if-empty:
          - "<veryUnimportant>-"
        x: 6
        y: 0
      confirmTake:
        name: "<highlight>%QUESTNAME%"
        lore:
          - "<positive>Faceți clic pentru a îndeplini misiunea <highlight>%QUESTNAME%"
        x: 3
        y: 2
      cancelTake:
        name: "<negative>Apasă pentru a NU participa la această misiune"
        lore:
          - "<negative>Și anulați această acțiune"
        x: 5
        y: 2
  progress:
    title: <highlight2>Detalii pentru Misiune
    button:
      unlockedObjective:
        name: "<highlight2>%ACTIVEOBJECTIVEID%<highlight>%OBJECTIVENAME%"
        lore:
          - "<main><BOLD>ACTIV</BOLD>"
          - "<veryUnimportant>%WRAPPEDOBJECTIVEDESCRIPTION%"
          - "<unimportant>%OBJECTIVETASKDESCRIPTION%"
          - ""
          - "<unimportant>Realizare:<positive>%ACTIVEOBJECTIVEPROGRESS% <unimportant>/<main>%OBJECTIVEPROGRESSNEEDED%"
        lore-if-description-empty:
          - "<main><BOLD>ACTIV</BOLD>"
          - "<veryUnimportant>Fără Descriere"
          - "<unimportant>%OBJECTIVETASKDESCRIPTION%"
          - ""
          - "<unimportant>Realizare:<positive>%ACTIVEOBJECTIVEPROGRESS% <unimportant>/<main>%OBJECTIVEPROGRESSNEEDED%"
      lockedObjective:
        name: "<highlight2>%ACTIVEOBJECTIVEID%. \n<unimportant><BOLD>[ASCUNS]"
        lore:
          - "<warn>Acest obiectiv nu a fost încă"
          - "<warn>A fost deblocat!"
      completedObjective:
        name: "<highlight2><strikethrough>%ACTIVEOBJECTIVEID%.\n<positive><strikethrough>%OBJECTIVENAME%"
        lore:
          - "<positive><BOLD>FINALIZAT</BOLD>"
          - "<veryUnimportant><strikethrough>%WRAPPEDOBJECTIVEDESCRIPTION%"
          - "<veryUnimportant><strikethrough>%COMPLETEDOBJECTIVETASKDESCRIPTION%"
          - ""
          - "<unimportant><strikethrough>Realizare:\n<positive><strikethrough>%ACTIVEOBJECTIVEPROGRESS%<unimportant><strikethrough>/<positive><strikethrough>%OBJECTIVEPROGRESSNEEDED%"
        lore-if-description-empty:
          - "<positive><BOLD>FINALIZAT</BOLD>"
          - "<veryUnimportant><strikethrough>Fără Descriere"
          - "<veryUnimportant><strikethrough>%COMPLETEDOBJECTIVETASKDESCRIPTION%"
          - ""
          - "<unimportant><strikethrough>Realizare:\n<positive><strikethrough>%ACTIVEOBJECTIVEPROGRESS%<unimportant><strikethrough>/\n<positive><strikethrough>%OBJECTIVEPROGRESSNEEDED%"
